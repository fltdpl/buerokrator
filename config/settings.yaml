paths:
  inbox: ./inbox
  archive: ./archive
  exports: ./exports
database:
  path: ./database/buerokrator.db
backup:
  target: ./backups
ocr:
  language: deu+eng
  tesseract:
    windows: C:/Program Files/Tesseract-OCR/tesseract.exe
    linux: /usr/bin/tesseract
classifier:
  model: gemma3:4b
  max_input_chars: 3000
  temperature: 0.0
logging:
  level: INFO
supported_file_types:
- .pdf
- .png
- .jpg
- .jpeg
supported_document_types:
- invoice
- tax
- insurance
- pension
- bank
- housing
- employment
- legal
- unknown
archive:
  category_mapping:
    invoice: Rechnungen
    tax: Steuern
    insurance: Versicherungen
    pension: Vorsorge
    bank: Bank
    housing: Wohnen
    employment: Arbeit
    legal: Recht
    unknown: Sonstiges
