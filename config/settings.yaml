paths:
  inbox: "./inbox"
  inbox_processed: "./inbox_processed"
  archive: "./archive"
  exports: "./exports"

database:
  path: "./database/buerokrator.db"

ocr:
  language: "deu+eng"
  tesseract:
    windows: "C:/Program Files/Tesseract-OCR/tesseract.exe"
    linux: "/usr/bin/tesseract"
  poppler:
    windows: "C:/Program Files/poppler/poppler-26.02.0/Library/bin"
    linux: ""

classifier:
  mode: "llm"
  #model: "qwen3:1.7b"
  model: "gemma3:4b"
  max_input_chars: 3000
  temperature: 0

logging:
  level: "INFO"

supported_file_types:
  - ".pdf"
  - ".png"
  - ".jpg"
  - ".jpeg"

supported_document_types:
  - insurance
  - invoice
  - building_savings
  - pension

archive:
  category_mapping:
    invoice: Rechnungen
    tax: Steuern
    insurance: Versicherungen
    building_savings: Vorsorge
    pension: Vorsorge
    unknown: Sonstiges
    bank: Bank
    housing: Wohnen
