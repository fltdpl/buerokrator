  <circle cx="181" cy="393" r="11" fill="#1e2229"/>
  <circle cx="340" cy="396" r="26" fill="#f7f8f6"/>
  <circle cx="331" cy="393" r="11" fill="#1e2229"/>
  <!-- zornige Brauen -->
