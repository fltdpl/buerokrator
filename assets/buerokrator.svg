    <rect x="176" y="52" width="160" height="270" rx="12" fill="#f7f8f6"/>
    <text x="214" y="126" font-family="DejaVu Serif" font-size="64" font-weight="bold" fill="#b9c7cc" text-anchor="middle">§</text>
